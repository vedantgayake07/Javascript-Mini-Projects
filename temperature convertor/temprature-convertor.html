<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temprature convertor</title>
    <link rel="Stylesheet" href="temprature-convertor.css">
</head>
<body>

    <h1>Temprature Convertor</h1>

    <div id="div1">
        <label id="lab1">Enter the temperature</label>
        <input type="text" id="txt">
        <div id="rad">
        <input type="radio" id="r1" name="temp">
        <label for="r1" id="rl1">Celsius -> fahrenheit</label>
        <br>
        <input type="radio" id="r2" name="temp">
        <label for="r2" id="rl2">fahrenheit -> Celsius  </label>
        </div>
        <button type="submit" id="submit">Submit</button>

    </div>
    <br><br><br>
        <label id="output"></label>

        <script src="temprature-convertor.js"></script>

    
</body>
